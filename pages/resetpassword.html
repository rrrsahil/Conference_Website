<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Conference Admin Panel</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/global/style.css" />
  <link rel="stylesheet" href="../css/global/responsive.css" />
  <link rel="stylesheet" href="../css/pages/login.css" />
  <link rel="stylesheet" href="../css/pages/resetpassword.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-decor">
      <div class="decor-item"><i class="fa-solid fa-lock"></i></div>
      <div class="decor-item"><i class="fa-solid fa-rotate-right"></i></div>
      <div class="decor-item"><i class="fa-solid fa-shield-halved"></i></div>
      <div class="decor-item"><i class="fa-solid fa-key"></i></div>
    </div>

    <div class="auth-container">
      <div class="auth-header">
        <div class="auth-logo">
          <div class="auth-shield" style="background:linear-gradient(135deg,#10B981,#059669);">
            <i class="fa-solid fa-lock-open"></i>
          </div>
          <h1>Conference Admin Panel</h1>
        </div>
      </div>

      <div class="auth-card">
        <h2 class="auth-card-title">Reset Password</h2>

        <div id="resetForm">
          <p style="text-align:center; font-size:13px; color:#64748B; margin-bottom:24px;">
            Create a new strong password for your admin account.
          </p>

          <div class="auth-input-group">
            <i class="fa-solid fa-lock input-prefix"></i>
            <input type="password" id="newPassword" placeholder="New Password" required />
            <button type="button" class="toggle-pw" onclick="togglePassword('newPassword', this)">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <div class="form-error" id="pwError" style="margin-top:-10px; margin-bottom:12px;"></div>

          <div class="auth-input-group">
            <i class="fa-solid fa-lock input-prefix"></i>
            <input type="password" id="confirmPassword" placeholder="Confirm New Password" required />
            <button type="button" class="toggle-pw" onclick="togglePassword('confirmPassword', this)">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <div class="form-error" id="confirmError" style="margin-top:-10px; margin-bottom:12px;"></div>

          <button class="auth-btn" id="resetBtn" onclick="doReset()">
            <i class="fa-solid fa-check-circle" style="margin-right:8px;"></i>Reset Password
          </button>
        </div>

        <!-- Success -->
        <div id="successState" style="display:none; text-align:center; padding:20px 0;">
          <div style="width:72px; height:72px; background:linear-gradient(135deg,#10B981,#059669); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:32px; margin:0 auto 16px;">
            <i class="fa-solid fa-check"></i>
          </div>
          <h3 style="font-size:18px; font-weight:700; color:#1E293B; margin-bottom:8px;">Password Reset!</h3>
          <p style="font-size:13px; color:#64748B; margin-bottom:20px;">Your password has been successfully updated. You can now log in with your new password.</p>
          <a href="login.html" class="auth-btn" style="display:inline-flex; align-items:center; text-decoration:none;">
            <i class="fa-solid fa-right-to-bracket" style="margin-right:8px;"></i>Go to Login
          </a>
        </div>

        <div class="auth-links-row" style="margin-top:20px;">
          <a href="login.html"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
        </div>
        <p class="auth-copyright">© 2024 Conference Admin. All rights reserved.</p>
      </div>
    </div>
  </div>

  <script>
    function togglePassword(fieldId, btn) {
      const field = document.getElementById(fieldId);
      const icon = btn.querySelector('i');
      if (field.type === 'password') { field.type = 'text'; icon.className = 'fa-regular fa-eye-slash'; }
      else { field.type = 'password'; icon.className = 'fa-regular fa-eye'; }
    }

    function doReset() {
      const pw = document.getElementById('newPassword').value;
      const cp = document.getElementById('confirmPassword').value;
      document.getElementById('pwError').textContent = '';
      document.getElementById('confirmError').textContent = '';
      let valid = true;
      if (pw.length < 6) { document.getElementById('pwError').textContent = 'Password must be at least 6 characters.'; valid = false; }
      if (pw !== cp)  { document.getElementById('confirmError').textContent = 'Passwords do not match.'; valid = false; }
      if (valid) {
        const btn = document.getElementById('resetBtn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:8px;"></i>Resetting...';
        btn.disabled = true;
        setTimeout(() => {
          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('successState').style.display = 'block';
        }, 1200);
      }
    }
  </script>
</body>
</html>
