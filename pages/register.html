<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Conference Admin Panel</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/global/style.css" />
  <link rel="stylesheet" href="../css/global/responsive.css" />
  <link rel="stylesheet" href="../css/pages/login.css" />
  <link rel="stylesheet" href="../css/pages/register.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-decor">
      <div class="decor-item"><i class="fa-solid fa-user-plus"></i></div>
      <div class="decor-item"><i class="fa-solid fa-lock"></i></div>
      <div class="decor-item"><i class="fa-solid fa-shield-halved"></i></div>
      <div class="decor-item"><i class="fa-solid fa-key"></i></div>
    </div>

    <div class="auth-container">
      <div class="auth-header">
        <div class="auth-logo">
          <div class="auth-shield">
            <i class="fa-solid fa-user-plus"></i>
          </div>
          <h1>Conference Admin Panel</h1>
        </div>
      </div>

      <div class="auth-card">
        <h2 class="auth-card-title">Create Account</h2>

        <div class="register-info">
          <i class="fa-solid fa-circle-info"></i>
          <span>Admin accounts require approval. You'll be notified once your account is activated.</span>
        </div>

        <form id="registerForm" novalidate>
          <!-- Full Name -->
          <div class="auth-input-group">
            <i class="fa-solid fa-user input-prefix"></i>
            <input type="text" id="fullname" name="fullname" placeholder="Full Name" required />
          </div>
          <div class="form-error" id="nameError" style="margin-top:-10px; margin-bottom:10px;"></div>

          <!-- Email -->
          <div class="auth-input-group">
            <i class="fa-solid fa-envelope input-prefix"></i>
            <input type="email" id="email" name="email" placeholder="Email Address" required />
          </div>
          <div class="form-error" id="emailError" style="margin-top:-10px; margin-bottom:10px;"></div>

          <!-- Password -->
          <div class="auth-input-group">
            <i class="fa-solid fa-lock input-prefix"></i>
            <input type="password" id="password" name="password" placeholder="Password" required oninput="checkStrength(this.value)" />
            <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>

          <!-- Password Strength -->
          <div class="password-strength">
            <div class="strength-bars">
              <div class="strength-bar" id="bar1"></div>
              <div class="strength-bar" id="bar2"></div>
              <div class="strength-bar" id="bar3"></div>
              <div class="strength-bar" id="bar4"></div>
            </div>
            <span class="strength-label" id="strengthLabel">Enter password</span>
          </div>

          <!-- Confirm Password -->
          <div class="auth-input-group">
            <i class="fa-solid fa-lock input-prefix"></i>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required />
            <button type="button" class="toggle-pw" onclick="togglePassword('confirmPassword', this)">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <div class="form-error" id="confirmError" style="margin-top:-10px; margin-bottom:10px;"></div>

          <button type="submit" class="auth-btn" id="registerBtn">
            <i class="fa-solid fa-user-plus" style="margin-right:8px;"></i>Create Account
          </button>
        </form>

        <div class="login-link">
          Already have an account? <a href="login.html">Sign In</a>
        </div>

        <p class="auth-copyright">© 2024 Conference Admin. All rights reserved.</p>
      </div>
    </div>
  </div>

  <script>
    function togglePassword(fieldId, btn) {
      const field = document.getElementById(fieldId);
      const icon = btn.querySelector('i');
      if (field.type === 'password') {
        field.type = 'text';
        icon.className = 'fa-regular fa-eye-slash';
      } else {
        field.type = 'password';
        icon.className = 'fa-regular fa-eye';
      }
    }

    function checkStrength(val) {
      const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
      const label = document.getElementById('strengthLabel');
      bars.forEach(b => b.className = 'strength-bar');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const classes = ['active-weak','active-fair','active-good','active-strong'];
      const labels = ['Weak','Fair','Good','Strong'];
      for (let i = 0; i < score; i++) bars[i].classList.add(classes[score-1]);
      label.textContent = score > 0 ? labels[score-1] : 'Enter password';
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      let valid = true;
      document.querySelectorAll('.form-error').forEach(el => el.textContent = '');

      const name = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (!name) { document.getElementById('nameError').textContent = 'Full name is required.'; valid = false; }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('emailError').textContent = 'Valid email required.'; valid = false; }
      if (password !== confirm) { document.getElementById('confirmError').textContent = 'Passwords do not match.'; valid = false; }

      if (valid) {
        const btn = document.getElementById('registerBtn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:8px;"></i>Creating Account...';
        btn.disabled = true;
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
      }
    });
  </script>
</body>
</html>
